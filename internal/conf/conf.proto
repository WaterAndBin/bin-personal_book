syntax = "proto3";
package kratos.api;

option go_package = "bin-personal-book/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }

  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }

  Database database = 1;
  Redis redis = 2;

  message MongoDB {
    string uri = 1;
    string database = 2;
  }

  MongoDB mongodb = 10;

  message Jwt {
    string secret = 1;
    int64 expire = 3;
  }

  Jwt jwt = 11;

  message Upload { string path = 1; }

  Upload upload = 12;
}
