server:
  http:
    addr: 0.0.0.0:8080
    timeout: 1s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 1s
data:
  database:
    driver: mysql
    source: root:root@tcp(127.0.0.1:3306)/test?parseTime=True&loc=Local
  redis:
    addr: 127.0.0.1:6379
    read_timeout: 0.2s
    write_timeout: 0.2s
  mongodb:
    uri: "mongodb://localhost:27017"
    database: "bin-personal-book"
  jwt:
    secret: bin-personal-book
    expire: 7200
  upload:
    path: ../../files
