syntax = "proto3";

package api.user.v1;

import "google/api/annotations.proto";

option go_package = "bin-personal-book/api/user/v1;v1";

service Greeter {
  // 登录
  rpc Login(LoginParams) returns (LoginResult) {
    option (google.api.http) = {
      post : "/login",
      body : "*"
    };
  }
}

message LoginParams {
  string account = 1;
  string password = 2;
}

message UserInfo { string account = 1; }

message LoginResult {
  string code = 1;
  string message = 2;
  string token = 3;
}