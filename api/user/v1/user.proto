syntax = "proto3";

package api.user.v1;

import "google/api/annotations.proto";

option go_package = "bin-personal-book/api/user/v1;v1";

service Greeter {
  // 登录
  rpc Login(LoginParams) returns (LoginResult) {
    option (google.api.http) = {
      post : "/login",
      body : "*"
    };
  }

  // 注册
  rpc Register(RegisterParams) returns (RegisterResult) {
    option (google.api.http) = {
      post : "/register",
      body : "*"
    };
  }
}

message LoginParams {
  string account = 1;
  string password = 2;
}

message RegisterParams {
  string account = 1;
  string password = 2;
}

message LoginResult { string token = 1; }

message RegisterResult {}